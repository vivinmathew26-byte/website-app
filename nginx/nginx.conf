worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Basic security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    server {
        listen 80;
        server_name _;

        # ---------- Public site ----------
        root /usr/share/nginx/html/frontend;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ---------- Admin panel ----------
        # noindex so it doesn't get crawled; real access control is the login itself.
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
            add_header X-Robots-Tag "noindex, nofollow" always;
        }

        # ---------- API reverse proxy ----------
        # Same-origin from the browser's point of view, so no CORS config needed
        # on the frontend/admin side. "api" is the backend's service name in
        # docker-compose.yml — Docker's internal DNS resolves it automatically.
        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Interactive API docs, handy to keep reachable during setup/testing.
        # Remove or protect this location once the site is live.
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }
    }
}
