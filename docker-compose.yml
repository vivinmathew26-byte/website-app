services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtt_user
      POSTGRES_PASSWORD: mtt_password
      POSTGRES_DB: mtt_db
    volumes:
      - mtt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtt_user -d mtt_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No ports exposed to the host on purpose — only "api" needs to reach it,
    # and they're already on the same Docker network.

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://mtt_user:mtt_password@db:5432/mtt_db

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mtt_pgdata:
